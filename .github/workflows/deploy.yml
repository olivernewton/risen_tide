name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy to Namecheap via lftp
        run: |
          lftp -c "
            set ftp:ssl-allow yes;
            set ssl:verify-certificate no;
            set net:timeout 30;
            set net:max-retries 3;
            open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' ftp.1031brandworks.com;
            mirror -R --verbose --ignore-time --exclude=^\.git --exclude=^\.github --exclude=\.pdf$ ./ /public_html/risentidecharters/;
            quit
          "
